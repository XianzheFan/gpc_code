# =============================================================================
# Phase 1: Single-step warmup training on Agilex plug data
# =============================================================================
# First convert dataset:
#   python convert_agilex_to_zarr.py \
#       --dataset_dir <path-to-agilex-plug-dataset> \
#       --output_path data/agilex_plug.zarr
# Then train:
#   python train_world_model_agilex.py --config configs/train_agilex_plug_phase_one.yml
# =============================================================================

dataset_path: data/agilex_plug.zarr
models_save_dir: checkpoints/plug_wm_phase_one

# Use stats from conversion (optional, auto-computed if omitted)
# action_stats_path: data/agilex_plug_stats.npy

# Training
num_epochs: 300
batch_size: 16
lr: 0.0002
save_every: 10
num_workers: 4

# Sequence
pred_horizon: 5           # Phase 1: short sequences
obs_horizon: 2
action_horizon: 5

# World model architecture
action_dim: 14             # agilex dual-arm
num_steps_conditioning: 4
cond_channels: 256
depths: [2, 2, 2, 2]
channels: [96, 96, 96, 96]
attn_depths: [0, 0, 1, 1]
resize_scale: 96

# Noise schedule
sigma_data: 0.5
sigma_offset_noise: 0.1
noise_previous_obs: true

wandb: false
run_name: plug_wm_phase1
