# =============================================================================
# Phase 1: Single-step warmup training on SimplerEnv data
# =============================================================================
# First convert dataset:
#   python convert_simplerenv_to_zarr.py \
#       --dataset_dir data/simpler_env_dreamdojo \
#       --output_path data/simpler_env_google.zarr \
#       --robot_type google
# Then train:
#   python train_world_model_agilex.py --config configs/train_simpler_phase_one.yml
# =============================================================================

dataset_path: data/simpler_env_google.zarr
models_save_dir: checkpoints/simpler_wm_phase_one

# Use stats from conversion (optional, auto-computed if omitted)
# action_stats_path: data/simpler_env_google_stats.npy

# Training
num_epochs: 300
batch_size: 128
lr: 0.0001
save_every: 10
num_workers: 4

# Sequence
pred_horizon: 5           # Phase 1: short sequences
obs_horizon: 2
action_horizon: 5

# World model architecture
action_dim: 7              # SimplerEnv single-arm (7-DOF)
num_steps_conditioning: 4
cond_channels: 256
depths: [2, 2, 2, 2]
channels: [96, 96, 96, 96]
attn_depths: [0, 0, 1, 1]
resize_scale: 96

# Noise schedule
sigma_data: 0.5
sigma_offset_noise: 0.1
noise_previous_obs: true

wandb: true
run_name: simpler_wm_phase1
